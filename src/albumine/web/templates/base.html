<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ text_dir }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AlbuMine{% endblock %}</title>
    <link rel="icon" href="/static/logo.svg">
    <script src="/static/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
    <header>
        <a href="/" class="brand">
            <img src="/static/logo.svg" alt="" class="brand-logo">
            AlbuMine
        </a>
        <nav>
            <a href="/">{{ t("nav.gallery") }}</a>
            <a href="/status">{{ t("nav.status") }}</a>
            <a href="/settings">{{ t("nav.settings") }}</a>
        </nav>
        <div class="header-action">
            <button hx-post="/rescan" hx-target="#header-flash" hx-swap="innerHTML">
                {{ t("action.rescan") }}
            </button>
            <span id="header-flash"></span>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <small>{{ t("footer.version", version=request.app.version) }}</small>
    </footer>
</body>
</html>
