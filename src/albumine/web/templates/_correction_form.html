<form id="correction-form" class="correction-form"
      hx-post="/pair/{{ record.pair_id }}/correct"
      hx-target="#correction-form" hx-swap="outerHTML">

    {% if flash %}
    <p class="flash flash-{{ flash[0] }}">{{ flash[1] }}</p>
    {% endif %}

    <label>
        {{ t("form.raw_text") }}
        <textarea name="raw_text" rows="3">{{ record.raw_text or "" }}</textarea>
    </label>

    <label>
        {{ t("form.date") }}
        <input type="text" name="date_text" value="{{ record.date_original_text or '' }}">
        <small>
            {{ t("form.date_recognized", iso=record.date_iso or "—") }}
            {% if record.date_confidence %}
            ({{ t("form.confidence", value=record.date_confidence) }})
            {% endif %}
        </small>
    </label>

    <label>
        {{ t("form.location") }}
        <input type="text" name="location" value="{{ record.location or '' }}">
    </label>

    <label>
        {{ t("form.people") }}
        <input type="text" name="people" value="{{ record.people | join(', ') }}">
    </label>

    <label>
        {{ t("form.event") }}
        <input type="text" name="event" value="{{ record.event or '' }}">
    </label>

    <label>
        {{ t("form.notes") }}
        <textarea name="notes" rows="2">{{ record.notes or "" }}</textarea>
    </label>

    <button type="submit">{{ t("form.save_correction") }}</button>
</form>
