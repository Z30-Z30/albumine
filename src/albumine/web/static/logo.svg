<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="AlbuMine">
  <defs>
    <clipPath id="albumine-card">
      <rect x="150" y="150" width="212" height="250" rx="16"/>
    </clipPath>
  </defs>

  <!-- dark rounded tile -->
  <rect width="512" height="512" rx="104" fill="#1c1f24"/>

  <!-- back card: the photo's annotated reverse side, peeking out -->
  <g transform="rotate(-11 256 256)">
    <rect x="174" y="108" width="196" height="244" rx="14" fill="#353b44" stroke="#4d5560" stroke-width="5"/>
    <line x1="200" y1="152" x2="332" y2="152" stroke="#5c6571" stroke-width="11" stroke-linecap="round"/>
    <line x1="200" y1="190" x2="312" y2="190" stroke="#5c6571" stroke-width="11" stroke-linecap="round"/>
    <line x1="200" y1="228" x2="324" y2="228" stroke="#5c6571" stroke-width="11" stroke-linecap="round"/>
  </g>

  <!-- front card: the photo itself -->
  <g transform="rotate(6 256 256)">
    <rect x="150" y="150" width="212" height="250" rx="16" fill="#ece9e3"/>
    <g clip-path="url(#albumine-card)">
      <circle cx="305" cy="212" r="23" fill="#c8a25a"/>
      <path d="M150 400 L150 332 L214 252 L262 312 L312 254 L362 322 L362 400 Z" fill="#2b3038"/>
    </g>
    <rect x="150" y="150" width="212" height="250" rx="16" fill="none" stroke="#c8a25a" stroke-width="10"/>
  </g>
</svg>
